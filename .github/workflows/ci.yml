name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch fonts
        shell: pwsh
        run: ./tools/Fetch-Fonts.ps1

      - name: Build Flowtype
        shell: pwsh
        run: ./tools/Build-Flowtype.ps1

      - name: Run tests
        shell: pwsh
        run: ./tests/Run-Tests.ps1

      - name: Verify version
        shell: pwsh
        run: |
          $version = [Diagnostics.FileVersionInfo]::GetVersionInfo('Flowtype.exe').FileVersion
          if ($version -ne '1.3.17.0') { throw "Unexpected version: $version" }
